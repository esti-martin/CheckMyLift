<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check My Lift</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="web-content">
        <header>
            <img src="../assets/Logo.svg" alt="Logo Check My Lift" class="logo">
        </header>

        <main>
            <section class="card-container">
                <section class="filtros-seleccionados">
                    <p>Filtros: -</p>
                </section>
                <article class="card-ascensor">
                    <article class="fav-icon">
                        <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        class="m-icon icon-heart">
                        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                        </svg>
                    </article>
                    <img src="../assets/empty-box.svg" alt="No hay imagen">                    
                    <section class="card-info">
                        <section class="info">
                            <section class="advert advert-ok">
                                <svg 
                                xmlns="http://www.w3.org/2000/svg" 
                                viewBox="0 0 24 24"
                                class="m-icon">
                                <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><path 
                                d="m9 10 2 2 4-4"/>
                                </svg>
                                <p>Todo funciona correctamente</p>
                            </section>
                            <section class="nombre+calle">
                                <h2>Nombre Ascensor</h2>
                                <p class="direction">C/ Falsa, 123</p>
                            </section>
                        </section>
                        <section class="ctas">
                            <button class="btn-princ">
                                <svg 
                                    xmlns="http://www.w3.org/2000/svg" 
                                    viewBox="0 0 24 24" 
                                    class="m-icon">
                                    <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
                                    <circle cx="12" cy="10" r="3"/>
                                </svg>
                                <span>
                                    <p>Cómo llegar</p>
                                </span>
                            </button>
                            <button class="btn-second">
                                Más información
                            </button>
                        </section>     
                    </section> 
                </article>
                <article class="card-ascensor">
                    <article class="fav-icon">
                        <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        class="m-icon icon-heart">
                        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                        </svg>
                    </article>
                    <img src="../assets/empty-box.svg" alt="No hay imagen">
                    <section class="card-info">
                        <section class="info">
                            <section class="advert advert-ok">
                                <svg 
                                xmlns="http://www.w3.org/2000/svg" 
                                viewBox="0 0 24 24" 
                                class="m-icon">
                                <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><path 
                                d="m9 10 2 2 4-4"/>
                                </svg>
                                <p>Todo funciona correctamente</p>
                            </section>
                            <section class="nombre+calle">
                                <h2>Nombre Ascensor</h2>
                                <p class="direction">C/ Falsa, 123</p>
                            </section>
                        </section>
                        <section class="ctas">
                            <button class="btn-princ">
                                <svg 
                                    xmlns="http://www.w3.org/2000/svg" 
                                    viewBox="0 0 24 24" 
                                    class="m-icon">
                                    <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
                                    <circle cx="12" cy="10" r="3"/>
                                </svg>
                                <span>
                                    <p>Cómo llegar</p>
                                </span>
                            </button>
                            <button class="btn-second">
                                Más información
                            </button>
                        </section>     
                    </section> 
                </article>
            </section>        
        </main>

        <footer>
            <section class="navbar">
                <article class="navbar-icon">
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        class="m-icon icon-home">
                        <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
                        <path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    </svg>
                </article>
                <article class="navbar-icon">
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        class="m-icon icon-map">

                        <path d="M15 5.764v15"/>
                        <path d="M9 3.236v15"/>
                    </svg>
                </article>
                <article class="navbar-icon">
                    <svg 
                        xmlns="http://www.w3.org/2000/svg"  
                        class="m-icon icon-filter">
                        <rect class="rect-filter" width="18" height="18" x="3" y="3" rx="2"/>
                        <line x1="21" x2="14" y1="4" y2="4"/>
                        <line x1="10" x2="3" y1="4" y2="4"/>
                        <line x1="21" x2="12" y1="12" y2="12"/>
                        <line x1="8" x2="3" y1="12" y2="12"/>
                        <line x1="21" x2="16" y1="20" y2="20"/>
                        <line x1="12" x2="3" y1="20" y2="20"/>
                        <line x1="14" x2="14" y1="2" y2="6"/>
                        <line x1="8" x2="8" y1="10" y2="14"/>
                        <line x1="16" x2="16" y1="18" y2="22"/>
                        
                    </svg>
                </article>
                <article class="navbar-icon">
                    <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    class="m-icon icon-heart">
                    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                </svg>
                </article>
            </section>
        </footer>
    </section>
    
</body>
</html>
