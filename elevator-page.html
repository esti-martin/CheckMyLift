<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check My Lift</title>
    <link rel="stylesheet" href="elevator-page.css">
</head>
<body>
    <section class="web-content">
        <header>
            <img src="../assets/Logo.svg" alt="Logo Check My Lift" class="logo">
        </header>

        <main>
            <section class="web-content">
                <section class="info-container">                
                    <button class="btn-volver">
                        <svg xmlns="http://www.w3.org/2000/svg"  class="m-icon">
                            <path d="m12 19-7-7 7-7"/>
                            <path d="M19 12H5"/>
                        </svg>
                        <p>Volver al listado</p>
                    </button>
                    <article class="info-ascensor">                     
                        <section class="card-info">  
                            <h2>Nombre Ascensor</h2>                      
                            <section class="advert advert-ok">
                                <svg 
                                    xmlns="http://www.w3.org/2000/svg" 
                                    viewBox="0 0 24 24"
                                    class="m-icon">
                                    <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
                                    <path d="m9 10 2 2 4-4"/>
                                </svg>
                                <p>Todo funciona correctamente</p>
                            </section>                   
                            <img src="../assets/empty-box.svg" alt="No hay imagen">
                            <dl class="info">                            <section>
                                    <dt>Municipio: </dt>
                                    <dd>Bilbao</dd>
                                </section>
                                <section>
                                    <dt>Barrio: </dt>
                                    <dd>Santutxu</dd>
                                </section>
                                <section>
                                    <dt>Tipo de ascensor: </dt>
                                    <dd>Exterior</dd>
                                </section>
                                <section class="ubicacion">
                                    <dt>Ubicación: </dt>
                                    <dd>
                                        <section>
                                            <dt>Arriba: </dt>
                                            <dd>C/ Karmelo, nº8</dd>
                                        </section>
                                        <section>
                                            <dt>Abajo: </dt>
                                            <dd>Interior metro Santutxu</dd>
                                        </section>
                                    </dd>
                                </section>
                            </dl>
                                                              
                            </section>                        
                            <section class="ctas">
                                <button class="btn-princ">
                                    <svg 
                                        xmlns="http://www.w3.org/2000/svg" 
                                        viewBox="0 0 24 24" 
                                        class="m-icon">
                                        <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
                                        <circle cx="12" cy="10" r="3"/>
                                    </svg>
                                    <span>
                                        <p>Cómo llegar</p>
                                    </span>
                                </button>
                            </section>     
                        </section> 
                    </article>
                </section>  
            </section>

            <section class="navbar">
                <article class="navbar-icon">
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        class="m-icon icon-home">
                        <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
                        <path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>

            </section>
